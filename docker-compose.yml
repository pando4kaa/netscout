# NetScout — PostgreSQL + Neo4j + Redis
# Run: docker compose up -d
# Backend connects via DATABASE_URL, NEO4J_*, REDIS_URL env vars

services:
  redis:
    image: redis:7-alpine
    container_name: netscout-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: netscout-postgres
    environment:
      POSTGRES_USER: netscout
      POSTGRES_PASSWORD: netscout
      POSTGRES_DB: netscout
    ports:
      - "127.0.0.1:5432:5432"  # IPv4 only — avoids localhost/::1 timeout on Windows
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netscout -d netscout"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: netscout-neo4j
    environment:
      NEO4J_AUTH: neo4j/netscout
    ports:
      - "7474:7474"   # HTTP (browser UI)
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: netscout-celery-worker
    command: celery -A app.celery_app worker -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://netscout:netscout@postgres:5432/netscout
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=netscout
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
